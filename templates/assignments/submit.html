{% extends 'base.html' %}
{% block title %}Submit Assignment{% endblock %}
{% block content %}
<div style="max-width:560px;margin:0 auto;">
  <div class="page-header">
    <h1 class="page-title">Submit Assignment</h1>
    <p class="page-subtitle">{{ assignment.title }} · Due {{ assignment.due_date|date:"M d, Y H:i" }}</p>
  </div>
  <div class="card">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="form-group"><label>Upload File</label>{{ form.file }}</div>
      <div class="form-group"><label>Notes (Optional)</label>{{ form.remarks }}</div>
      <div class="flex-gap">
        <button type="submit" class="btn btn-success">Submit Assignment</button>
        <a href="{% url 'assignment_detail' assignment.pk %}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
