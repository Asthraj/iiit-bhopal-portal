{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div style="max-width:620px;margin:0 auto;">
  <div class="page-header"><h1 class="page-title">{{ title }}</h1></div>
  <div class="card">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="form-row">
        <div class="form-group"><label>Title</label>{{ form.title }}</div>
        <div class="form-group"><label>Subject</label>{{ form.subject }}</div>
      </div>
      <div class="form-group"><label>Content / Description</label>{{ form.content }}</div>
      <div class="form-group"><label>Attach File (PDF, PPT, etc.)</label>{{ form.file }}</div>
      <div class="flex-gap">
        <button type="submit" class="btn btn-secondary">Upload Note</button>
        <a href="{% url 'note_list' %}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
